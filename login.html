<!DOCTYPE html><html lang="zh-TW"><head>  <meta charset="UTF-8" />  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <title>島嶼旅跡 — 登入</title>  <link rel="preconnect" href="https://fonts.googleapis.com" />  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700&family=Noto+Serif+TC:wght=400;700&display=swap" rel="stylesheet" />  <style>    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {      --red:       #E63329;      --red-dark:  #c0271d;      --orange:    #F26522;      --text:      #1a1a1a;      --muted:     #888;      --border:    #e0e0e0;      --bg:        #ffffff;      --tab-bg:    #f5f5f5;    }
    html, body {      height: 100%;      font-family: 'Noto Sans TC', sans-serif;      color: var(--text);      background: #f0ede8;    }
    /* ── Layout ── */    .page {      display: grid;      grid-template-columns: 1fr 1fr;      min-height: 100vh;    }
    /* ── Left hero panel ── */    .hero {      position: relative;      overflow: hidden;    }
    .hero__photo {      position: absolute;      inset: 0;      background:        linear-gradient(to bottom, rgba(0,0,0,.25) 0%, rgba(0,0,0,.05) 40%, rgba(0,0,0,.55) 100%),        url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1200&q=80') center/cover no-repeat;    }
    .hero__logo {      position: absolute; top: 32px; left: 32px; font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 700; color: #fff; letter-spacing: .04em; display: flex; align-items: center; gap: 6px;    }
    .hero__logo .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
    .hero__copy { position: absolute; bottom: 56px; left: 40px; right: 40px; }
    .hero__tagline { font-family: 'Noto Serif TC', serif; font-size: clamp(28px, 3.5vw, 44px); font-weight: 700; color: #fff; line-height: 1.4; margin-bottom: 12px; }
    .hero__tagline .accent { color: var(--orange); }
    .hero__sub { font-size: 14px; color: rgba(255,255,255,.75); letter-spacing: .03em; }
    /* ── Right panel ── */    .form-panel { background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 60px 40px; }
    .form-inner { width: 100%; max-width: 360px; }
    /* Tabs */    .tabs { display: grid; grid-template-columns: 1fr 1fr; background: var(--tab-bg); border-radius: 12px; padding: 4px; margin-bottom: 36px; }
    .tab { border: none; background: transparent; border-radius: 9px; padding: 10px; font-family: 'Noto Sans TC', sans-serif; font-size: 15px; font-weight: 500; color: var(--muted); cursor: pointer; transition: background .2s, color .2s, box-shadow .2s; }
    .tab.active { background: #fff; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.12); }
    /* Welcome */    .welcome-heading { font-size: 26px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
    .welcome-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    /* Fields */    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .input-wrap input { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 44px 12px 14px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; color: var(--text); background: #fff; outline: none; transition: border-color .2s; }
    .input-wrap input::placeholder { color: #bbb; }
    .input-wrap input:focus { border-color: var(--red); }
    .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex; align-items: center; }
    /* Forgot */    .forgot-row { text-align: right; margin-top: 6px; }
    .forgot-row a { font-size: 12px; color: var(--red); text-decoration: none; }
    .forgot-row a:hover { text-decoration: underline; }
    /* Primary btn */    .btn-primary { width: 100%; background: var(--red); color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 700; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; margin-top: 24px; transition: background .2s, transform .1s; }
    .btn-primary:hover { background: var(--red-dark); } .btn-primary:active { transform: scale(.98); }
    /* Divider */    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 12px; } .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    /* Social btns */    .btn-social { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; background: #fff; color: var(--text); cursor: pointer; margin-bottom: 10px; transition: border-color .2s, background .2s; }
    .btn-social:hover { border-color: #bbb; background: #fafafa; }
    /* Register link */    .register-row { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
    .register-row a { color: var(--red); font-weight: 600; text-decoration: none; }
    .register-row a:hover { text-decoration: underline; }
    /* ── Responsive ── */    @media (max-width: 768px) { .page { grid-template-columns: 1fr; } .hero { min-height: 220px; } .hero__copy { bottom: 28px; left: 24px; right: 24px; } .form-panel { padding: 40px 24px; } }
    /* Eye icon SVG */    .eye-icon { pointer-events: none; }  </style></head><body>
<div class="page">
  <div class="hero">    <div class="hero__photo"></div>
    <div class="hero__logo">島嶼旅跡<span class="dot"></span></div>
    <div class="hero__copy">
      <p class="hero__tagline">每一趟旅程，<br>儲存成<span class="accent">全新的自己</span></p>
      <p class="hero__sub">加入島嶼旅跡，開啟你的台灣深度之旅</p>
    </div>  </div>
  <div class="form-panel">    <div class="form-inner">
      <div class="tabs" role="tablist">
        <button class="tab active" role="tab" aria-selected="true" id="tab-login" onclick="switchTab('login')">登入</button>
        <button class="tab" role="tab" aria-selected="false" id="tab-register" onclick="switchTab('register')">註冊</button>
      </div>
      <div id="panel-login">
        <h1 class="welcome-heading">歡迎回來 👋</h1>
        <p class="welcome-sub">登入帳號以管理你的旅行體驗</p>
        <div class="field">          <label for="email">電子信箱</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
          </div>        </div>
        <div class="field">          <label for="password">密碼</label>
          <div class="input-wrap">            <input type="password" id="password" placeholder="輸入密碼" autocomplete="current-password" />
            <button class="toggle-pw" onclick="togglePw()" aria-label="顯示／隱藏密碼" type="button">
              <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>                <circle cx="12" cy="12" r="3"/>
              </svg>            </button>          </div>          <div class="forgot-row"><a href="#">忘記密碼？</a></div>        </div>
        <button class="btn-primary" id="btn-login-submit">登入</button>
        <div class="divider">或使用</div>
        <button class="btn-social">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg> 使用 Google 帳號登入        </button>
        <button class="btn-social">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
          </svg> 使用 Facebook 帳號登入        </button>
        <p class="register-row">還沒有帳號？<a href="#" onclick="switchTab('register'); return false;">點此免費註冊</a></p>      </div>
      <div id="panel-register" style="display:none;">
        <h1 class="welcome-heading">建立帳號 ✈️</h1>
        <p class="welcome-sub">免費加入，開啟你的台灣深度旅行</p>
        <div class="field">          <label for="reg-name">姓名</label>
          <div class="input-wrap">            <input type="text" id="reg-name" placeholder="你的姓名" autocomplete="name" />
          </div>        </div>
        <div class="field">          <label for="reg-email">電子信箱</label>
          <div class="input-wrap">            <input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email" />
          </div>        </div>
        <div class="field">          <label for="reg-password">密碼</label>
          <div class="input-wrap">            <input type="password" id="reg-password" placeholder="設定密碼（至少 8 位）" autocomplete="new-password" />
          </div>        </div>
        <button class="btn-primary" id="btn-reg-submit">免費註冊</button>
        <div class="divider">或使用</div>
        <button class="btn-social">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg> 使用 Google 帳號註冊        </button>
        <p class="register-row">已有帳號？<a href="#" onclick="switchTab('login'); return false;">立即登入</a></p>      </div>    </div>  </div></div>
<script>
  function switchTab(tab) {
    const loginTab   = document.getElementById('tab-login');
    const registerTab = document.getElementById('tab-register');
    const loginPanel  = document.getElementById('panel-login');
    const registerPanel = document.getElementById('panel-register');
    if (tab === 'login') {
      loginTab.classList.add('active'); loginTab.setAttribute('aria-selected', 'true');
      registerTab.classList.remove('active'); registerTab.setAttribute('aria-selected', 'false');
      loginPanel.style.display = ''; registerPanel.style.display = 'none';
    } else {
      registerTab.classList.add('active'); registerTab.setAttribute('aria-selected', 'true');
      loginTab.classList.remove('active'); loginTab.setAttribute('aria-selected', 'false');
      registerPanel.style.display = ''; loginPanel.style.display = 'none';
    }
  }

  function togglePw() {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  }

  // ── 使用 DOM 事件監聽，確保 100% 觸發 ──
  document.addEventListener('DOMContentLoaded', function() {
    
    // 1. 監聽登入按鈕
    const loginBtn = document.getElementById('btn-login-submit');
    if(loginBtn) {
      loginBtn.addEventListener('click', function() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        // 檢查是否為空
        if (!email || !password) {
          alert('請填寫電子信箱與密碼');
          return;
        }

        // 核心關鍵：檢查信箱字元有沒有包含 @
        if (!email.includes('@')) {
          alert('錯誤：電子信箱格式不正確，請輸入包含 @ 的信箱帳號');
          return;
        }

        alert('登入成功！歡迎回來 👋');
      });
    }

    // 2. 監聽註冊按鈕
    const regBtn = document.getElementById('btn-reg-submit');
    if(regBtn) {
      regBtn.addEventListener('click', function() {
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;

        if (!name || !email || !password) {
          alert('請填寫所有欄位資料');
          return;
        }

        // 註冊信箱同步檢查有沒有 @
        if (!email.includes('@')) {
          alert('錯誤：註冊電子信箱格式不正確，請輸入包含 @ 的信箱帳號');
          return;
        }

        alert('註冊成功！準備開啟旅程 ✈️');
      });
    }
  });
</script>
</body></html>
